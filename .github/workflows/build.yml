name: Build SeguridadGolden

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:

  # ============================================================
  # BUILD PARA WINDOWS (usando MSVC en vez de MinGW)
  # ============================================================
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Descargar código del repositorio
        uses: actions/checkout@v4

      - name: Preparar entorno de MSVC (cl.exe, nmake)
        uses: ilammy/msvc-dev-cmd@v1

      - name: Instalar Qt (versión MSVC)
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.7.0'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          modules: 'qtimageformats'
          mirror: 'https://download.qt.io'
          cache: false

      - name: Compilar
        shell: cmd
        run: |
          mkdir build-windows
          cd build-windows
          qmake ..\SeguridadGolden.pro CONFIG+=release
          nmake

      - name: Empaquetar con windeployqt
        shell: cmd
        run: |
          cd build-windows\release
          windeployqt SeguridadGolden.exe --release --no-translations

      - name: Subir resultado como artifact descargable
        uses: actions/upload-artifact@v4
        with:
          name: SeguridadGolden-Windows
          path: build-windows/release/

  # ============================================================
  # BUILD PARA LINUX
  # ============================================================
  build-linux:
    # Fijamos ubuntu-22.04 (en vez de ubuntu-latest) porque linuxdeployqt
    # es una herramienta vieja que se cuelga sin avisar en Ubuntu 24.04
    # (glibc más nueva de lo que soporta).
    runs-on: ubuntu-22.04
    steps:
      - name: Descargar código del repositorio
        uses: actions/checkout@v4

      - name: Instalar Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.7.0'
          host: 'linux'
          target: 'desktop'
          modules: 'qtimageformats'
          mirror: 'https://download.qt.io'
          cache: false

      - name: Instalar dependencias del sistema
        run: sudo apt-get update && sudo apt-get install -y libgl1-mesa-dev fuse libfuse2 imagemagick patchelf

      - name: Compilar
        run: |
          mkdir build-linux
          cd build-linux
          qmake ../SeguridadGolden.pro CONFIG+=release
          make -j$(nproc)

      - name: Descargar linuxdeploy y su plugin de Qt
        run: |
          wget -c "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage"
          wget -c "https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage"
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage

      - name: Armar AppDir y generar AppImage
        env:
          QMAKE: ${{ env.Qt6_DIR }}/bin/qmake
        run: |
          cd build-linux
          mkdir -p AppDir/usr/bin
          cp SeguridadGolden AppDir/usr/bin/
          convert -size 256x256 xc:#1b5e20 AppDir/icon.png
          cat > AppDir/SeguridadGolden.desktop <<EOF2
          [Desktop Entry]
          Type=Application
          Name=SeguridadGolden
          Exec=SeguridadGolden
          Icon=icon
          Categories=Utility;
          EOF2
          cd ..
          ./linuxdeploy-x86_64.AppImage --appdir build-linux/AppDir \
            --executable build-linux/AppDir/usr/bin/SeguridadGolden \
            --desktop-file build-linux/AppDir/SeguridadGolden.desktop \
            --icon-file build-linux/AppDir/icon.png \
            --plugin qt \
            --output appimage

      - name: Subir resultado como artifact descargable
        uses: actions/upload-artifact@v4
        with:
          name: SeguridadGolden-Linux
          path: '*.AppImage'
